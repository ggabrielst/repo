<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="enviarform" method="post">
        <label for="nome">Nome:</label><br>
        <input type="text" name="nome" id="" required><br><br>
        <label for="sexo">Sexo:</label><br>
        <input type="radio" name="sexo" id="" value="Masculino" required>
        <label for="masculino">Masculino</label>
        <input type="radio" name="sexo" id="" value="Feminino" required>
        <label for="feminino">Feminino</label><br><br>
        <label for="estadocivil">Estado civil:</label><br>
        <select name="estadocivil" id="" disabled selected required>
            <option value="casado">Casado</option>
            <option value="solteiro">Solteiro</option>
            <option value="viuvo">Viúvo</option>
            <option value="divorciado">Divorciado</option>
            <option value="outro">Outro</option>
        </select><br><br>
        <label for="email">Email:</label><br>
        <input type="email" name="email" id="" required><br><br>
        <label for="endereco">Endereço:</label><br>
        <input type="text" name="endereco" id="" required>
        <label for="numendereco">Número:</label>
        <input type="number" name="numendereco" min="1" max="5000" placeholder="1-5000" required><br><br>
        <label for="telefone">Telefone:</label><br>
        <input type="tel" name="telefone" id="" placeholder="(00) 90000-0000" pattern="\(\d{2}\)\s\d{4,5}-\d{4}" required><br><br>
        <label for="datadenas">Data de nascimento:</label><br>
        <input type="date" name="datadenas" id="" required><br><br>
        <label for="site">Página pessoal:</label><br>
        <input type="url" name="site" id="" placeholder="https://ava.iftm.edu.br/"><br><br>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>
